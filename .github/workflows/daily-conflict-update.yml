name: Daily Conflict Data Update

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次 (UTC 时间)
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies with compatible versions
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Update conflict data and store in database
        run: |
          python conflict_data.py
          
      - name: Generate daily heatmap
        run: |
          python create_heatmap.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git status
          if ! git diff --staged --quiet; then
            git commit -m "Hourly update: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "Changes committed and pushed successfully!"
          else
            echo "No changes to commit"
          fi