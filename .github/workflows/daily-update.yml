name: Daily WarInfo Update

on:
  schedule:
    # 每小时运行一次 (UTC 时间)
    - cron: '0 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'
    
    - name: Install dependencies with compatible versions
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run daily update script
      run: |
        python3 update_daily.py
    
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add conflict_data.json global_conflict_heatmap.html conflict_data.db
        git status
        if ! git diff --staged --quiet; then
          git commit -m "Hourly update: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "Changes committed and pushed successfully!"
        else
          echo "No changes to commit"
        fi