name: Daily Conflict Data Update

on:
  schedule:
    - cron: '0 2 * * *'  # 每天UTC时间2点运行
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Update conflict data and store in database
        run: |
          python conflict_data.py
          
      - name: Generate daily heatmap
        run: |
          python create_heatmap.py
          
      - name: Generate weekly reports (Mondays only)
        if: ${{ github.event.schedule == '0 2 * * 1' }}
        run: |
          mkdir -p reports/weekly
          python report_generator.py --type=weekly --output=reports/weekly/weekly_$(date +%Y-%m-%d).json
          
      - name: Generate monthly reports (1st of each month)
        if: ${{ github.event.schedule == '0 2 1 * *' }}
        run: |
          mkdir -p reports/monthly
          python report_generator.py --type=monthly --year=$(date +%Y) --month=$(date +%m) --output=reports/monthly/monthly_$(date +%Y-%m).json
          
      - name: Generate quarterly reports (1st of Jan/Apr/Jul/Oct)
        if: ${{ github.event.schedule == '0 2 1 1,4,7,10 *' }}
        run: |
          mkdir -p reports/quarterly
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          QUARTER=$(( (MONTH - 1) / 3 + 1 ))
          python report_generator.py --type=quarterly --year=$YEAR --quarter=$QUARTER --output=reports/quarterly/quarterly_${YEAR}_Q${QUARTER}.json
          
      - name: Generate annual reports (Jan 1st)
        if: ${{ github.event.schedule == '0 2 1 1 *' }}
        run: |
          mkdir -p reports/annual
          python report_generator.py --type=annual --year=$(date +%Y) --output=reports/annual/annual_$(date +%Y).json
          
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Daily update: $(date)" || echo "No changes to commit"
          git push