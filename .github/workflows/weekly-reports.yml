name: Weekly Conflict Reports

on:
  schedule:
    - cron: '0 3 * * 1'  # 每周一 UTC 3:00 运行（在每日更新后）
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Generate weekly summary report
        run: |
          python report_generator.py --type=weekly --output=reports/weekly/$(date +%Y-%m-%d)_weekly_report.json
          
      - name: Commit weekly reports
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add reports/weekly/
          git commit -m "Weekly report: $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push