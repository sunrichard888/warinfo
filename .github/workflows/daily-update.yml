name: Daily WarInfo Update

on:
  schedule:
    # 每天 UTC 时间 02:00 运行 (北京时间 10:00)
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 pandas lxml
    
    - name: Run daily update script
      run: |
        python3 update_daily.py
    
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add conflict_data.json global_conflict_heatmap.html
        git status
        if ! git diff --staged --quiet; then
          git commit -m "Daily update: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "Changes committed and pushed successfully!"
        else
          echo "No changes to commit"
        fi